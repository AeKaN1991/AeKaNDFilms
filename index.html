<style>

:root{

--bg:#0B0B0B;
--accent:#C69C5D;
--ink:#EDEAE4;
--ink-dim:#8C8781;
--line:rgba(237,234,228,0.09);

}

*{

margin:0;
padding:0;
box-sizing:border-box;

}

html{

background:var(--bg);

}

body{

background:var(--bg);

color:var(--ink);

font-family:'Inter',sans-serif;

font-weight:300;

min-height:100vh;

overflow:hidden;

-webkit-font-smoothing:antialiased;

-moz-osx-font-smoothing:grayscale;

}


/* ---------- ATMOSPHERE ---------- */

.background{

position:fixed;

inset:0;

background:

linear-gradient(rgba(11,11,11,.72),
rgba(11,11,11,.72)),

url('IMG_1002.png');

background-size:cover;

background-position:center;

z-index:-1;

}


/* ---------- HEADER ---------- */

.site-header{

position:absolute;

top:12vh;

left:8vw;

right:8vw;

display:flex;

justify-content:space-between;

align-items:center;

z-index:10;

}


.brand{

font-size:11px;

font-weight:500;

letter-spacing:.18em;

text-transform:uppercase;

text-decoration:none;

color:var(--ink);

}


nav{

display:flex;

gap:34px;

}


nav a{

font-size:11px;

letter-spacing:.12em;

text-transform:uppercase;

text-decoration:none;

color:var(--ink-dim);

transition:.3s;

}


nav a:hover{

color:var(--accent);

}



/* ---------- HERO ---------- */

.hero{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

padding:0 40px;

}


.hero-content{

margin-top:-4vh;

}


.hero h1{

font-family:'Fraunces',serif;

font-weight:300;

font-size:clamp(72px,8vw,132px);

line-height:.92;

letter-spacing:-0.03em;

color:var(--ink);

}


.tagline{

margin-top:26px;

font-size:18px;

font-weight:400;

letter-spacing:.04em;

color:var(--accent);

}



/* ---------- DESCRIPTION ---------- */

.description{

position:absolute;

left:8vw;

bottom:18vh;

max-width:560px;

font-family:'Fraunces',serif;

font-style:italic;

font-size:18px;

line-height:1.7;

color:var(--ink-dim);

}



/* ---------- RESPONSIVE ---------- */

@media(max-width:960px){

body{

overflow:auto;

}

.site-header{

top:48px;

left:28px;

right:28px;

flex-direction:column;

gap:24px;

align-items:flex-start;

}

nav{

flex-wrap:wrap;

gap:18px;

}

.hero{

padding:0 28px;

}

.hero h1{

font-size:64px;

}

.tagline{

font-size:16px;

}

.description{

position:relative;

left:auto;

bottom:auto;

margin:0 28px 60px;

max-width:100%;

font-size:16px;

}

}

</style>

</head>

<body>


<div class="background"></div>
