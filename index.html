<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AeKaN DFilms</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>

:root{

--accent:#C69C5D;
--text:#EDEAE4;
--muted:#8C8781;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Inter,sans-serif;

height:100vh;

overflow:hidden;

color:var(--text);

background:url("IMG_1002.png");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

position:relative;

}

body::before{

content:"";

position:absolute;

inset:0;

background:

linear-gradient(

180deg,

rgba(0,0,0,.25),

rgba(0,0,0,.45),

rgba(0,0,0,.72)

);

z-index:0;

}


/* NAVIGATION */

nav{

position:absolute;

top:12vh;

left:8vw;

right:8vw;

display:flex;

justify-content:space-between;

align-items:center;

z-index:5;

}

.brand{

text-decoration:none;

font-size:11px;

letter-spacing:.18em;

text-transform:uppercase;

font-weight:500;

color:var(--text);

}

.nav-links{

display:flex;

gap:34px;

}

.nav-links a{

text-decoration:none;

font-size:11px;

letter-spacing:.14em;

text-transform:uppercase;

color:var(--muted);

transition:.3s;

}

.nav-links a:hover{

color:var(--accent);

}


/* HERO */

.hero{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

text-align:center;

z-index:2;

}

.hero h1{

font-family:Fraunces,serif;

font-size:7rem;

font-weight:300;

line-height:.9;

letter-spacing:-3px;

margin-bottom:18px;

}

.hero p{

font-size:1rem;

letter-spacing:.04em;

color:var(--accent);

}


/* DESCRIPTION */

.description{

position:absolute;

bottom:18vh;

left:50%;

transform:translateX(-50%);

width:620px;

max-width:85%;

text-align:center;

font-family:Fraunces,serif;

font-style:italic;

font-size:18px;

line-height:1.7;

color:var(--muted);

z-index:3;

}


/* MOBILE */

@media(max-width:768px){

nav{

flex-direction:column;

gap:22px;

top:8vh;

}

.nav-links{

gap:16px;

flex-wrap:wrap;

justify-content:center;

}

.hero h1{

font-size:4rem;

}

.hero p{

font-size:.9rem;

}

.description{

width:90%;

font-size:16px;

bottom:12vh;

}

}

</style>

</head>
