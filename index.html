<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"

content="width=device-width, initial-scale=1.0">

<title>AeKaN DFilms</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

}

body{

font-family:Arial,sans-serif;

height:100vh;

overflow:hidden;

color:white;

background:

linear-gradient(

rgba(0,0,0,0.25),

rgba(0,0,0,0.55)

),

url("IMG_1002.png");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

position:relative;

}

body::after{

content:"";

position:absolute;

inset:0;

background:

radial-gradient(

circle at center,

rgba(0,0,0,.15),

rgba(0,0,0,.72)

);

pointer-events:none;

}

nav{

position:absolute;

top:30px;

left:50%;

transform:translateX(-50%);

display:flex;

gap:45px;

z-index:10;

align-items:center;

}

nav a{

text-decoration:none;

color:white;

font-size:15px;

font-weight:400;

letter-spacing:1px;

opacity:.9;

transition:.3s;

}

nav a:hover{

opacity:1;

color:#d8b46a;

}

.hero{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

text-align:center;

z-index:5;

width:90%;

max-width:900px;

}

.logo{

width:140px;

margin-bottom:25px;

}

.hero h1{

font-size:72px;

font-weight:300;

letter-spacing:2px;

}

.tagline{

margin-top:20px;

font-size:26px;

letter-spacing:2px;

opacity:.95;

}

.description{

position:absolute;

bottom:60px;

left:50%;

transform:translateX(-50%);

width:80%;

max-width:720px;

text-align:center;

line-height:1.8;

font-size:15px;

opacity:.88;

z-index:5;

}

@media(max-width:900px){

nav{

gap:18px;

font-size:12px;

overflow-x:auto;

padding:0 20px;

}

.hero h1{

font-size:44px;

}

.tagline{

font-size:18px;

line-height:1.5;

}

.description{

font-size:13px;

width:90%;

bottom:40px;

}

.logo{

width:110px;

}

}

@media(max-width:600px){

nav{

gap:15px;

font-size:11px;

}

.hero{

top:48%;

}

.hero h1{

font-size:34px;

}

.tagline{

font-size:15px;

}

.description{

font-size:12px;

line-height:1.7;

bottom:30px;

}

.logo{

width:90px;

}

}

</style>

</head>

<body>

<nav>

<a href="#">Services</a>

<a href="#">Categories</a>

<a href="#">Showreels</a>

<a href="#">Pricing</a>

<a href="#">About Us</a>

<a href="#">Contact Us</a>

</nav>

<div class="hero">

<!-- Replace with logo later -->

<!--

<img class="logo"

src="logo.png">

-->

<h1>AeKaN DFilms</h1>

<p class="tagline">

Crafting Stories Through Light, Color and Emotion

</p>

</div>

<div class="description">

AeKaN DFilms is an independent video production studio specializing in cinematic storytelling, from concept development and production to post-production and final delivery.

</div>

</body>

</html>
